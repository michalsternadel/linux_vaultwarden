---
- name: Ensure required packages are present (Debian OS Family)
  become: true
  ansible.builtin.apt:
    name:
      - logrotate
      - "{{ 'ssl-cert' if linux_vaultwarden_ssl | default(false) | bool else omit }}"
    state: present
    update_cache: true
    force_apt_get: true
  when: ansible_os_family == 'Debian'

- name: Ensure required packages are present (Alpine OS Family)
  become: true
  community.general.apk:
    name: logrotate
    state: present
    update_cache: true
  when: ansible_os_family == 'Alpine'

- name: Ensure vaultwarden group exists
  become: true
  ansible.builtin.group:
    name: "{{ linux_vaultwarden_group }}"
    state: present
    system: true

- name: Ensure vaultwarden user exists
  become: true
  ansible.builtin.user:
    name: "{{ linux_vaultwarden_user }}"
    state: present
    system: true
    shell: /usr/sbin/nologin
    comment: "Vaultwarden User"
    group: "{{ linux_vaultwarden_group }}"
    groups: "{{ linux_vaultwarden_ssl_user_group if (linux_vaultwarden_ssl | default(false) | bool and ansible_os_family == 'Debian') else omit }}"
    create_home: true
    home: "{{ linux_vaultwarden_home_directory }}"

- name: Ensure vaultwarden home directory exits
  become: true
  ansible.builtin.file:
    path: "{{ linux_vaultwarden_home_directory }}"
    state: directory
    owner: "{{ linux_vaultwarden_user }}"
    group: "{{ linux_vaultwarden_group }}"
    mode: "0750"

- name: Ensure vaultwarden config directory exits
  become: true
  ansible.builtin.file:
    path: "{{ linux_vaultwarden_config_directory }}"
    state: directory
    owner: "{{ linux_vaultwarden_user }}"
    group: "{{ linux_vaultwarden_group }}"
    mode: "0750"

- name: Ensure vaultwarden data directory exits
  become: true
  ansible.builtin.file:
    path: "{{ linux_vaultwarden_home_directory }}/data"
    state: directory
    owner: "{{ linux_vaultwarden_user }}"
    group: "{{ linux_vaultwarden_group }}"
    mode: "0750"

- name: Ensure vaultwarden logs directory exits
  become: true
  ansible.builtin.file:
    path: "{{ linux_vaultwarden_log_directory }}"
    state: directory
    owner: "{{ linux_vaultwarden_user }}"
    group: "{{ linux_vaultwarden_group }}"
    mode: "0750"

- name: Ensure vaultwarden tmp directory exits
  become: true
  ansible.builtin.file:
    path: "{{ linux_vaultwarden_home_directory }}/tmp"
    state: directory
    owner: "{{ linux_vaultwarden_user }}"
    group: "{{ linux_vaultwarden_group }}"
    mode: "0750"

- name: Ensure Vaultwarden logrotate is configured
  become: true
  ansible.builtin.template:
    src: etc/logrotate.d/vaultwarden.j2
    dest: /etc/logrotate.d/vaultwarden
    owner: root
    group: root
    mode: "0640"
